<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5ee"/>
      <stop offset="100%" style="stop-color:#f0faf4"/>
    </linearGradient>
    <linearGradient id="wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa"/>
      <stop offset="100%" style="stop-color:#f3f4f6"/>
    </linearGradient>
    <linearGradient id="win1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe"/>
      <stop offset="100%" style="stop-color:#bfdbfe"/>
    </linearGradient>
    <linearGradient id="win2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef9c3"/>
      <stop offset="100%" style="stop-color:#fef08a"/>
    </linearGradient>
    <linearGradient id="win3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dcfce7"/>
      <stop offset="100%" style="stop-color:#bbf7d0"/>
    </linearGradient>
    <linearGradient id="floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6ee7b7"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
  </defs>

  <!-- Ciel / Fond -->
  <rect width="800" height="500" fill="url(#sky)"/>

  <!-- Soleil -->
  <circle cx="680" cy="80" r="55" fill="#fef9c3" opacity="0.7"/>
  <circle cx="680" cy="80" r="38" fill="#fef08a" opacity="0.8"/>

  <!-- Nuages -->
  <ellipse cx="120" cy="90" rx="60" ry="22" fill="white" opacity="0.6"/>
  <ellipse cx="165" cy="80" rx="45" ry="20" fill="white" opacity="0.6"/>
  <ellipse cx="80" cy="80" rx="35" ry="18" fill="white" opacity="0.6"/>

  <ellipse cx="520" cy="60" rx="50" ry="18" fill="white" opacity="0.5"/>
  <ellipse cx="560" cy="52" rx="38" ry="16" fill="white" opacity="0.5"/>

  <!-- Immeuble principal (centre) -->
  <rect x="200" y="100" width="400" height="360" rx="6" fill="url(#wall)" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Toit décoratif -->
  <rect x="192" y="90" width="416" height="20" rx="4" fill="#0F6F4F" opacity="0.9"/>
  <rect x="210" y="82" width="380" height="18" rx="3" fill="#1E8E63" opacity="0.7"/>

  <!-- Ligne de séparation étages -->
  <line x1="200" y1="240" x2="600" y2="240" stroke="#e5e7eb" stroke-width="1.5"/>
  <line x1="200" y1="340" x2="600" y2="340" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- === ÉTAGE 3 (haut) : Bureau / Télétravail === -->
  <!-- Fenêtre 1 gauche — personne au bureau -->
  <rect x="230" y="118" width="110" height="100" rx="5" fill="url(#win1)" stroke="#bfdbfe" stroke-width="1.5"/>
  <!-- Bureau -->
  <rect x="238" y="185" width="94" height="8" rx="2" fill="#1e40af" opacity="0.3"/>
  <!-- Écran -->
  <rect x="258" y="150" width="55" height="35" rx="3" fill="#1e3a8a" opacity="0.6"/>
  <rect x="263" y="155" width="45" height="25" rx="2" fill="#60a5fa" opacity="0.4"/>
  <!-- Silhouette personne assise -->
  <circle cx="285" cy="148" r="10" fill="#1d4ed8" opacity="0.4"/>
  <rect x="274" y="158" width="22" height="25" rx="4" fill="#1d4ed8" opacity="0.3"/>

  <!-- Fenêtre 2 droite — plantes / salon -->
  <rect x="460" y="118" width="110" height="100" rx="5" fill="url(#win3)" stroke="#bbf7d0" stroke-width="1.5"/>
  <!-- Plante grande -->
  <rect x="538" y="155" width="6" height="50" fill="#15803d" opacity="0.6"/>
  <circle cx="541" cy="148" r="20" fill="#16a34a" opacity="0.5"/>
  <circle cx="526" cy="155" r="14" fill="#22c55e" opacity="0.4"/>
  <circle cx="554" cy="158" r="12" fill="#4ade80" opacity="0.4"/>
  <!-- Pot -->
  <rect x="531" y="200" width="20" height="14" rx="3" fill="#a16207" opacity="0.5"/>
  <!-- Canapé -->
  <rect x="466" y="185" width="60" height="25" rx="4" fill="#15803d" opacity="0.3"/>
  <rect x="466" y="178" width="60" height="14" rx="4" fill="#15803d" opacity="0.25"/>

  <!-- === ÉTAGE 2 (milieu) : Colocation / Vie commune === -->
  <!-- Fenêtre 3 gauche — cuisine / repas -->
  <rect x="230" y="254" width="110" height="68" rx="5" fill="url(#win2)" stroke="#fef08a" stroke-width="1.5"/>
  <!-- Table ronde -->
  <ellipse cx="285" cy="298" rx="30" ry="12" fill="#ca8a04" opacity="0.3"/>
  <!-- Assiettes -->
  <circle cx="272" cy="296" r="7" fill="white" opacity="0.7"/>
  <circle cx="298" cy="296" r="7" fill="white" opacity="0.7"/>
  <!-- Silhouettes 2 personnes -->
  <circle cx="272" cy="276" r="8" fill="#92400e" opacity="0.35"/>
  <rect x="265" y="284" width="15" height="16" rx="3" fill="#92400e" opacity="0.25"/>
  <circle cx="298" cy="276" r="8" fill="#b45309" opacity="0.35"/>
  <rect x="291" y="284" width="15" height="16" rx="3" fill="#b45309" opacity="0.25"/>

  <!-- Fenêtre 4 droite — chambre / repos -->
  <rect x="460" y="254" width="110" height="68" rx="5" fill="#fce7f3" stroke="#fbcfe8" stroke-width="1.5"/>
  <!-- Lit -->
  <rect x="468" y="280" width="94" height="30" rx="4" fill="#ec4899" opacity="0.2"/>
  <rect x="468" y="274" width="94" height="14" rx="4" fill="#ec4899" opacity="0.3"/>
  <!-- Oreillers -->
  <rect x="474" y="278" width="22" height="14" rx="3" fill="white" opacity="0.7"/>
  <rect x="540" y="278" width="22" height="14" rx="3" fill="white" opacity="0.7"/>
  <!-- Lampe de chevet -->
  <rect x="546" y="268" width="4" height="14" fill="#9f1239" opacity="0.3"/>
  <ellipse cx="548" cy="265" rx="10" ry="6" fill="#fda4af" opacity="0.5"/>

  <!-- Fenêtre centrale large — espace commun avec plantes et canapé -->
  <rect x="330" y="118" width="140" height="210" rx="5" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
  <!-- Canapé central -->
  <rect x="345" y="270" width="110" height="40" rx="8" fill="#0F6F4F" opacity="0.25"/>
  <rect x="345" y="258" width="110" height="22" rx="6" fill="#0F6F4F" opacity="0.2"/>
  <rect x="345" y="258" width="18" height="52" rx="6" fill="#0F6F4F" opacity="0.2"/>
  <rect x="437" y="258" width="18" height="52" rx="6" fill="#0F6F4F" opacity="0.2"/>
  <!-- Table basse -->
  <ellipse cx="400" cy="312" rx="35" ry="12" fill="#d1fae5" opacity="0.8"/>
  <!-- Plante déco -->
  <rect x="396" y="200" width="8" height="60" fill="#15803d" opacity="0.5"/>
  <circle cx="400" cy="192" r="26" fill="#16a34a" opacity="0.35"/>
  <circle cx="388" cy="200" r="16" fill="#22c55e" opacity="0.3"/>
  <circle cx="412" cy="202" r="14" fill="#4ade80" opacity="0.3"/>
  <rect x="390" y="255" width="20" height="15" rx="3" fill="#92400e" opacity="0.4"/>
  <!-- Tableau mural -->
  <rect x="352" y="128" width="96" height="55" rx="3" fill="white" opacity="0.7" stroke="#bbf7d0" stroke-width="1"/>
  <!-- Petite maison dans le tableau -->
  <polygon points="400,138 430,155 430,178 370,178 370,155" fill="#dcfce7" opacity="0.8"/>
  <polygon points="400,135 435,157 365,157" fill="#0F6F4F" opacity="0.4"/>
  <rect x="392" y="163" width="16" height="15" rx="2" fill="#0F6F4F" opacity="0.4"/>
  <!-- Silhouette 2 personnes sur canapé -->
  <circle cx="372" cy="250" r="9" fill="#0F6F4F" opacity="0.35"/>
  <circle cx="428" cy="250" r="9" fill="#1E8E63" opacity="0.35"/>

  <!-- === REZ-DE-CHAUSSÉE : Entrée / Hall === -->
  <!-- Porte principale -->
  <rect x="348" y="355" width="104" height="105" rx="4" fill="#0F6F4F" opacity="0.15" stroke="#0F6F4F" stroke-width="1.5"/>
  <rect x="355" y="362" width="44" height="90" rx="3" fill="#0F6F4F" opacity="0.1"/>
  <rect x="401" y="362" width="44" height="90" rx="3" fill="#0F6F4F" opacity="0.1"/>
  <!-- Poignées -->
  <rect x="393" y="405" width="5" height="15" rx="2" fill="#0F6F4F" opacity="0.5"/>
  <rect x="401" y="405" width="5" height="15" rx="2" fill="#0F6F4F" opacity="0.5"/>

  <!-- Boîtes aux lettres -->
  <rect x="225" y="380" width="50" height="40" rx="3" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1"/>
  <line x1="250" y1="380" x2="250" y2="420" stroke="#d1d5db" stroke-width="1"/>
  <line x1="225" y1="400" x2="275" y2="400" stroke="#d1d5db" stroke-width="1"/>

  <!-- Numéro immeuble -->
  <circle cx="400" cy="345" r="14" fill="#0F6F4F" opacity="0.8"/>
  <text x="400" y="350" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="white">P</text>

  <!-- Immeuble gauche (arrière-plan) -->
  <rect x="30" y="160" width="160" height="300" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1" opacity="0.7"/>
  <rect x="30" y="152" width="160" height="14" rx="3" fill="#d1d5db" opacity="0.6"/>
  <rect x="50" y="180" width="50" height="40" rx="3" fill="#bfdbfe" opacity="0.5"/>
  <rect x="120" y="180" width="50" height="40" rx="3" fill="#bbf7d0" opacity="0.5"/>
  <rect x="50" y="240" width="50" height="40" rx="3" fill="#fef08a" opacity="0.5"/>
  <rect x="120" y="240" width="50" height="40" rx="3" fill="#fce7f3" opacity="0.5"/>
  <rect x="50" y="300" width="50" height="40" rx="3" fill="#dcfce7" opacity="0.5"/>
  <rect x="120" y="300" width="50" height="40" rx="3" fill="#bfdbfe" opacity="0.5"/>
  <!-- Porte -->
  <rect x="88" y="380" width="44" height="80" rx="3" fill="#9ca3af" opacity="0.3"/>

  <!-- Immeuble droit (arrière-plan) -->
  <rect x="610" y="180" width="160" height="280" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1" opacity="0.7"/>
  <rect x="610" y="172" width="160" height="14" rx="3" fill="#d1d5db" opacity="0.6"/>
  <rect x="630" y="200" width="50" height="40" rx="3" fill="#fce7f3" opacity="0.5"/>
  <rect x="700" y="200" width="50" height="40" rx="3" fill="#dbeafe" opacity="0.5"/>
  <rect x="630" y="260" width="50" height="40" rx="3" fill="#dcfce7" opacity="0.5"/>
  <rect x="700" y="260" width="50" height="40" rx="3" fill="#fef9c3" opacity="0.5"/>
  <rect x="630" y="320" width="50" height="40" rx="3" fill="#dbeafe" opacity="0.5"/>
  <rect x="700" y="320" width="50" height="40" rx="3" fill="#dcfce7" opacity="0.5"/>
  <!-- Porte -->
  <rect x="668" y="390" width="44" height="70" rx="3" fill="#9ca3af" opacity="0.3"/>

  <!-- Arbres / végétation -->
  <!-- Arbre gauche -->
  <rect x="135" y="365" width="10" height="100" fill="#78350f" opacity="0.4"/>
  <circle cx="140" cy="348" r="30" fill="#15803d" opacity="0.5"/>
  <circle cx="125" cy="358" r="20" fill="#16a34a" opacity="0.4"/>
  <circle cx="155" cy="355" r="22" fill="#22c55e" opacity="0.4"/>

  <!-- Arbre droit -->
  <rect x="658" y="365" width="10" height="100" fill="#78350f" opacity="0.4"/>
  <circle cx="663" cy="348" r="28" fill="#166534" opacity="0.5"/>
  <circle cx="648" cy="358" r="18" fill="#15803d" opacity="0.4"/>
  <circle cx="678" cy="355" r="20" fill="#4ade80" opacity="0.35"/>

  <!-- Petit arbre entrée -->
  <rect x="196" y="420" width="8" height="45" fill="#78350f" opacity="0.4"/>
  <circle cx="200" cy="412" r="22" fill="#16a34a" opacity="0.5"/>

  <rect x="597" y="420" width="8" height="45" fill="#78350f" opacity="0.4"/>
  <circle cx="601" cy="412" r="22" fill="#15803d" opacity="0.5"/>

  <!-- Sol / trottoir -->
  <rect x="0" y="455" width="800" height="45" fill="#d1fae5" opacity="0.5"/>
  <rect x="0" y="460" width="800" height="40" fill="#a7f3d0" opacity="0.3"/>
  <!-- Chemin d'entrée -->
  <rect x="340" y="455" width="120" height="45" fill="#6ee7b7" opacity="0.4"/>

  <!-- Quelques petits détails : fleurs sur le trottoir -->
  <circle cx="310" cy="462" r="5" fill="#fb7185" opacity="0.5"/>
  <circle cx="325" cy="458" r="4" fill="#f9a8d4" opacity="0.5"/>
  <circle cx="480" cy="462" r="5" fill="#fbbf24" opacity="0.5"/>
  <circle cx="465" cy="458" r="4" fill="#fde68a" opacity="0.5"/>
</svg>

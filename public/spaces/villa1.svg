<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bae6fd"/>
      <stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
    <linearGradient id="grass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#sky)"/>
  <!-- Jardin -->
  <rect x="0" y="320" width="800" height="130" fill="url(#grass)" opacity="0.8"/>
  <!-- Villa -->
  <rect x="180" y="160" width="440" height="180" rx="4" fill="white" opacity="0.9"/>
  <!-- Toit -->
  <polygon points="160,160 400,60 640,160" fill="#fb923c" opacity="0.8"/>
  <!-- Porte -->
  <rect x="360" y="250" width="80" height="90" rx="4" fill="#0ea5e9" opacity="0.7"/>
  <!-- Fenêtres -->
  <rect x="210" y="190" width="80" height="60" rx="3" fill="#7dd3fc" opacity="0.7"/>
  <rect x="510" y="190" width="80" height="60" rx="3" fill="#7dd3fc" opacity="0.7"/>
  <!-- Arbres -->
  <circle cx="120" cy="280" r="50" fill="#22c55e" opacity="0.8"/>
  <rect x="110" y="300" width="20" height="50" fill="#92400e" opacity="0.6"/>
  <circle cx="680" cy="280" r="50" fill="#16a34a" opacity="0.8"/>
  <rect x="670" y="300" width="20" height="50" fill="#92400e" opacity="0.6"/>
  <text x="400" y="430" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#166534" opacity="0.8">Villa avec jardin</text>
</svg>
